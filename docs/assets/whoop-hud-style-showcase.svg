<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">WHOOP HUD style showcase</title>
  <desc id="desc">Animated synthetic showcase of multiple WHOOP-style HUD presets. No real athlete footage or private health data is used.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101612"/>
      <stop offset=".52" stop-color="#202820"/>
      <stop offset="1" stop-color="#050706"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172016" stop-opacity=".9"/>
      <stop offset="1" stop-color="#050705" stop-opacity=".7"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .t { font-family: Arial, Helvetica, sans-serif; fill: #f3f5ed; font-weight: 800; letter-spacing: 1px; }
      .s { font-family: Arial, Helvetica, sans-serif; fill: #aab5a8; font-weight: 700; letter-spacing: .7px; }
      .m { font-family: Menlo, Consolas, monospace; fill: #c7ff00; font-weight: 900; }
      .c { fill: #19d7ff; }
      .r { fill: #ff3b1f; }
      .card { fill: url(#panel); stroke: #c7ff00; stroke-opacity: .32; }
      .scan { animation: scan 2.6s linear infinite; }
      .pulse { animation: pulse 1.1s ease-in-out infinite; transform-origin: center; }
      .bar { animation: bar 2.2s ease-in-out infinite; transform-origin: left center; }
      .orbit { animation: orbit 6s linear infinite; transform-origin: center; }
      .stomp { animation: stomp 2.8s ease-in-out infinite; transform-origin: center; }
      .ticker { animation: ticker 5s linear infinite; }
      .streak { animation: streak 1.4s ease-out infinite; transform-origin: center; }
      @keyframes scan { 0% { transform: translateX(-120px); opacity: 0; } 12%,55% { opacity: .7; } 100% { transform: translateX(260px); opacity: 0; } }
      @keyframes pulse { 0%,100% { opacity: .45; transform: scale(.97); } 50% { opacity: 1; transform: scale(1.05); } }
      @keyframes bar { 0%,100% { transform: scaleX(.35); } 50% { transform: scaleX(.92); } }
      @keyframes orbit { to { transform: rotate(360deg); } }
      @keyframes stomp { 0%,82%,100% { transform: scale(1); } 88% { transform: scale(1.08); } 92% { transform: translateX(-3px) scale(1.02); } 96% { transform: translateX(3px); } }
      @keyframes ticker { from { transform: translateX(40px); } to { transform: translateX(-160px); } }
      @keyframes streak { 0% { opacity: 0; transform: scale(.6) rotate(0deg); } 25% { opacity: .8; } 100% { opacity: 0; transform: scale(1.3) rotate(8deg); } }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <g opacity=".22">
    <path d="M0 560 C170 492 240 642 390 550 S665 460 820 545 1040 638 1200 506" fill="none" stroke="#c7ff00" stroke-width="2"/>
    <path d="M0 155 L1200 92" stroke="#19d7ff" stroke-width="1"/>
    <path d="M0 630 L1200 690" stroke="#ff3b1f" stroke-width="1"/>
  </g>

  <text x="60" y="62" class="t" font-size="30">WHOOP HUD STYLE PRESETS</text>
  <text x="60" y="92" class="s" font-size="15">Synthetic animated showcase / preset + prompt-custom styles</text>

  <g transform="translate(60 130)">
    <rect class="card" width="320" height="150" rx="22"/>
    <text x="22" y="34" class="s" font-size="13">01 BROADCAST BRIGHT</text>
    <text x="22" y="92" class="m pulse" font-size="56">12.8</text>
    <text x="158" y="84" class="s" font-size="15">DAY STRAIN</text>
    <rect x="22" y="118" width="250" height="8" rx="4" fill="#313a31"/>
    <rect class="bar" x="22" y="118" width="250" height="8" rx="4" fill="#c7ff00"/>
    <rect class="scan" x="0" y="0" width="72" height="150" fill="#c7ff00" opacity=".13"/>
  </g>

  <g transform="translate(440 130)">
    <rect class="card" width="320" height="150" rx="22"/>
    <text x="22" y="34" class="s" font-size="13">02 GLASS SIDE HUD</text>
    <text x="22" y="94" class="m pulse" font-size="62">168</text>
    <text x="150" y="84" class="s" font-size="15">BPM</text>
    <path d="M210 110 L235 92 L260 104 L292 74" fill="none" stroke="#19d7ff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(820 130)">
    <rect class="card" width="320" height="150" rx="22"/>
    <text x="22" y="34" class="s" font-size="13">07 HOLOGRAPHIC MATRIX</text>
    <g opacity=".85">
      <path d="M44 102 L128 54 L238 72 L284 116 L174 130 Z" fill="none" stroke="#19d7ff" stroke-width="2"/>
      <path d="M44 102 H284 M128 54 L174 130 M238 72 L174 130" stroke="#c7ff00" stroke-opacity=".55"/>
      <circle class="pulse" cx="128" cy="54" r="8" fill="#c7ff00" filter="url(#glow)"/>
      <circle class="pulse" cx="238" cy="72" r="7" fill="#19d7ff" filter="url(#glow)"/>
    </g>
  </g>

  <g transform="translate(60 330)">
    <rect class="card" width="320" height="150" rx="22"/>
    <text x="22" y="34" class="s" font-size="13">08 SPEED TUNNEL HR</text>
    <g class="streak" opacity=".8">
      <path d="M160 75 L20 20 M160 75 L300 18 M160 75 L18 136 M160 75 L302 132" stroke="#c7ff00" stroke-width="5" stroke-linecap="round"/>
      <path d="M160 75 L50 75 M160 75 L270 75" stroke="#ff3b1f" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="91" y="97" class="m stomp" font-size="66">181</text>
    <text x="214" y="88" class="s" font-size="15">BPM</text>
  </g>

  <g transform="translate(440 330)">
    <rect class="card" width="320" height="150" rx="22"/>
    <text x="22" y="34" class="s" font-size="13">09 RECOVERY ORBIT</text>
    <circle cx="98" cy="90" r="40" fill="none" stroke="#303a30" stroke-width="12"/>
    <circle cx="98" cy="90" r="40" fill="none" stroke="#c7ff00" stroke-width="12" stroke-linecap="round" stroke-dasharray="190 252" transform="rotate(-90 98 90)"/>
    <g class="orbit">
      <circle cx="98" cy="40" r="6" fill="#19d7ff" filter="url(#glow)"/>
    </g>
    <text x="168" y="94" class="m" font-size="46">76%</text>
  </g>

  <g transform="translate(820 330)">
    <rect class="card" width="320" height="150" rx="22"/>
    <text x="22" y="34" class="s" font-size="13">10 DATA STOMP TITLE</text>
    <text x="22" y="96" class="t stomp" font-size="38">REDLINE</text>
    <rect x="218" y="62" width="76" height="28" rx="8" fill="#c7ff00"/>
    <text x="230" y="82" fill="#050705" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="900">Z4</text>
    <rect class="scan" x="0" y="0" width="90" height="150" fill="#fff" opacity=".08"/>
  </g>

  <g transform="translate(80 560)">
    <rect width="1040" height="66" rx="22" fill="#050705" opacity=".82" stroke="#f3f5ed" stroke-opacity=".16"/>
    <g class="ticker">
      <text x="20" y="42" class="m" font-size="22">06 MINIMAL TICKER</text>
      <text x="270" y="42" class="s" font-size="18">HR 154</text>
      <text x="405" y="42" class="s" font-size="18">STRAIN 12.8</text>
      <text x="585" y="42" class="s" font-size="18">RECOVERY 76%</text>
      <text x="790" y="42" class="s" font-size="18">PROMPT CUSTOM READY</text>
    </g>
  </g>
</svg>
